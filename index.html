<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Quiz - Fremont Students</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Theme Toggle -->
        <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode"></button>

        <!-- Landing Screen -->
        <div id="landing" class="screen active" role="main" aria-label="Quiz landing page">
            <div class="logo" aria-hidden="true">🎯</div>
            <h1>Math Quiz Challenge</h1>
            <p class="subtitle">Test your skills. Race the clock. Beat your score.</p>
            
            <div class="grade-select">
                <p>Select your grade:</p>
                <div class="grade-buttons">
                    <button class="grade-btn" onclick="startQuiz(6)" aria-label="Start 6th grade quiz">
                        <span class="grade-label">6th Grade</span>
                        <span class="grade-desc">Ratios, Fractions, Variables</span>
                    </button>
                    <button class="grade-btn grade7" onclick="startQuiz(7)" aria-label="Start 7th grade quiz">
                        <span class="grade-label">7th Grade</span>
                        <span class="grade-desc">Proportions, Integers, Probability</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz" class="screen" role="main" aria-label="Quiz">
            <div class="quiz-header">
                <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                    <div id="progress" class="progress-fill"></div>
                </div>
                <div class="quiz-stats">
                    <span id="question-counter" aria-live="polite">Question 1/10</span>
                    <span id="timer" aria-live="polite">⏱️ 00:00</span>
                </div>
            </div>

            <div class="question-container">
                <div id="question-box">
                    <span id="topic-tag" class="topic-tag">Ratios</span>
                    <h2 id="question-text">Loading...</h2>
                </div>
                
                <div id="options" class="options-grid" role="group" aria-label="Answer options">
                    <!-- Options injected by JS -->
                </div>
            </div>

            <div id="feedback" class="feedback hidden" role="status" aria-live="polite">
                <span id="feedback-icon" aria-hidden="true"></span>
                <p id="feedback-text"></p>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results" class="screen" role="main" aria-label="Quiz results">
            <div class="results-header">
                <div class="trophy" aria-hidden="true">🏆</div>
                <h2>Quiz Complete!</h2>
            </div>

            <div class="score-circle" role="img" aria-label="Your score">
                <span id="final-score">0</span>
                <small>/10</small>
            </div>

            <div class="stats-grid">
                <div class="stat">
                    <span class="stat-value" id="correct-count">0</span>
                    <span class="stat-label">Correct</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="avg-time">0s</span>
                    <span class="stat-label">Avg Time</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="grade-rating">-</span>
                    <span class="stat-label">Rating</span>
                </div>
            </div>

            <div class="result-actions">
                <button class="btn btn-primary" onclick="retakeQuiz()" aria-label="Retake quiz">↻ Try Again</button>
                <button class="btn btn-secondary" onclick="changeGrade()" aria-label="Change grade level">← Change Grade</button>
            </div>
        </div>
    </div>

    <script src="quiz.js"></script>
</body>
</html>
